<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Elektryczny – AK ELEKTRO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f4f6f9;
}

header {
    text-align: center;
    background: white;
    padding: 20px;
}

header img {
    max-width: 240px;
}

.back {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #003366;
    font-weight: bold;
    text-decoration: none;
}

.container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #003366;
}

.option {
    background: #f4f4f4;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
}

.option:hover {
    background: #e00000;
    color: white;
}

.selected {
    background: #003366;
    color: white;
}

button {
    width: 100%;
    padding: 15px;
    background: #003366;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #e00000;
}

.progress {
    text-align: center;
    margin-bottom: 10px;
    font-weight: bold;
}

.ranking {
    margin-top: 20px;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png">
    <a href="index.html" class="back">⬅ Powrót do strony głównej</a>
</header>

<div class="container" id="app">

<h1>⚡ Quiz Elektryczny</h1>

<div id="start">
    <input type="text" id="name" placeholder="Twoje imię (do rankingu)">
    
    <button onclick="startQuiz('client')">🏠 Test dla klienta</button>
    <button onclick="startQuiz('pro')">👷 Test dla elektryka</button>
</div>

<div id="quiz" style="display:none;">
    <div class="progress" id="progress"></div>
    <h2 id="question"></h2>
    <div id="options"></div>
    <button onclick="next()">Dalej</button>
</div>

</div>

<script>

// (tu zostaje cały Twój JS bez zmian)

// ===== PYTANIA DLA KLIENTA =====
const clientQuestions = [
["Gniazdko iskrzy. Co robisz?", ["Wyłączam prąd i wzywam elektryka","Ignoruję","Używam dalej","Polewam wodą"], 0],
["Często wyskakuje bezpiecznik. To oznacza:", ["Problem w instalacji","Normalne","Brak prądu","Za mało napięcia"], 0],
["Zapach spalenizny z instalacji:", ["Wyłączam prąd","Ignoruję","Otwieram okno","Podłączam więcej"], 0],
["Stara instalacja może być:", ["Niebezpieczna","Najlepsza","Nowoczesna","Bez znaczenia"], 0],
["Uszkodzony kabel:", ["Wymieniam","Używam dalej","Ignoruję","Zalewam wodą"], 0]
];

// ===== PYTANIA DLA ELEKTRYKA =====
const proQuestions = [
["Która jednostka jest jednostką natężenia prądu elektrycznego?", ["Wolt", "Amper", "Om", "Wat"], 1],
["Jak nazywa się urządzenie do pomiaru napięcia?", ["Amperomierz", "Woltomierz", "Omomierz", "Miernik cęgowy"], 1],
["Napięcie w gniazdku:", ["110 V", "230 V", "400 V", "12 V"], 1],
["Wzór na moc:", ["P=U*I","P=U/R","P=I/R","P=R*I"], 0],
["Prawo Ohma:", ["I=U/R","I=R/U","I=U*R","I=R²"], 0]
];

let questions = [];
let index = 0;
let score = 0;
let selected = null;
let user = "";

function startQuiz(type) {
    user = document.getElementById("name").value || "Anonim";

    if(type === "client") questions = clientQuestions;
    if(type === "pro") questions = proQuestions;

    questions = [...questions].sort(()=>Math.random()-0.5).slice(0,10);

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    load();
}

function load() {
    selected = null;

    document.getElementById("progress").innerText =
        `Pytanie ${index+1} / ${questions.length}`;

    document.getElementById("question").innerText = questions[index][0];

    let html = "";
    questions[index][1].forEach((opt,i)=>{
        html += `<div class="option" onclick="select(this,${i})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = html;
}

function select(el,i){
    document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    el.classList.add("selected");
    selected = i;
}

function next(){
    if(selected===null){
        alert("Wybierz odpowiedź!");
        return;
    }

    if(selected===questions[index][2]) score++;

    index++;

    if(index<questions.length) load();
    else end();
}

function end(){
    saveScore();

    let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

    document.getElementById("app").innerHTML = `
        <h1>Wynik: ${score}/${questions.length}</h1>

        <div class="ranking">
            <h3>🏆 Ranking:</h3>
            ${ranking.map(r=>`<div>${r.name} (${r.score})</div>`).join("")}
        </div>

        <button onclick="location.reload()">Zagraj ponownie</button>
        <a href="index.html"><button>Strona główna</button></a>
    `;
}

function saveScore(){
    let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

    ranking.push({name:user, score:score});

    ranking.sort((a,b)=>b.score-a.score);
    ranking = ranking.slice(0,5);

    localStorage.setItem("ranking", JSON.stringify(ranking));
}
</script>

</body>
</html>
